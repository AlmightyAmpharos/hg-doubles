<!DOCTYPE html>
<html>
<head>
    <title>Pokémon Details</title>
</head>
<body>

<div id="pokemon-details"></div>

<script>
const params = new URLSearchParams(window.location.search);
const pokemonId = Number(params.get('id'));

fetch('webdata/pokemon.json')
  .then(response => response.json())
  .then(data => {
    const pokemon = data.find(p => p.id === pokemonId);

    document.getElementById('pokemon-details').innerHTML = `
  <img src="${pokemon.sprite}" width="96">
  <h1>${pokemon.name}</h1>
  <p>Type: ${pokemon.type}</p>
  <table border="1">
  <tr>
    <th>Stat</th>
    <th>Value</th>
  </tr>
  <tr>
    <td>HP</td>
    <td>${pokemon.hp}</td>
  </tr>
  <tr>
    <td>Atk</td>
    <td>${pokemon.attack}</td>
  </tr>
  <tr>
    <td>Def</td>
    <td>${pokemon.defense}</td>
  </tr>
  <tr>
    <td>Spd</td>
    <td>${pokemon.speed}</td>
  </tr>
  <tr>
    <td>Sp.Atk</td>
    <td>${pokemon.spAttack}</td>
  </tr>
  <tr>
    <td>Sp.Def</td>
    <td>${pokemon.spDefense}</td>
  </tr>
</table>
`;
  });
</script>

</body>
</html>
