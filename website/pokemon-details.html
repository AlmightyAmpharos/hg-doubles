<!DOCTYPE html>
<html>
<head>
    <title>Pokémon Details</title>

    <style>

    body {
        font-family: Arial, sans-serif;
        max-width: 1000px;
        margin: auto;
        padding: 20px;
    }

    .pokemon-header {
        border: 1px solid #ccc;
        padding: 20px;
        text-align: center;
        margin-bottom: 20px;
    }

    .type-icons img {
        margin: 0 2px;
    }

    .ability-box {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
        margin-bottom: 20px;
    }

    .ability-column {
        border: 1px solid #ccc;
        text-align: center;
        padding: 10px;
    }

    .stats-box {
        border: 1px solid #ccc;
        padding: 20px;
    }

    .stats-container {
        border: 1px solid #ccc;
        padding: 15px;
    }

    .stat-row {
        display: grid;
        grid-template-columns: 90px 60px 1fr;
        align-items: center;
        margin: 6px 0;
        gap: 10px;
    }

    .stat-label {
        font-weight: bold;
    }

    .stat-bar-bg {
        background: #eee;
        height: 14px;
        width: 100%;
        border-radius: 6px;
    }

    .stat-bar-fill {
        height: 14px;
        border-radius: 6px;
    }

    .stat-value {
        text-align: right;
    }

    .bst {
        margin-top: 10px;
        text-align: right;
    }

    </style>

</head>
<body>

<div id="pokemon-details"></div>

<script>

const params = new URLSearchParams(window.location.search);
const pokemonId = params.get('id');

/* -------------------------
   STAT FUNCTIONS
--------------------------*/

function getStatColor(value) {
    if (value <= 29) return "#e0534c";
    if (value <= 59) return "#ef8636";
    if (value <= 89) return "#F9DE6E";
    if (value <= 119) return "#AED46D";
    if (value <= 149) return "#62CA6B";
    return "#57BFB7";
}

function renderStat(label, value) {
    const percent = Math.min(value / 225, 1) * 100;
    const color = getStatColor(value);

    return `
    <div class="stat-row">

        <div class="stat-label">${label}</div>

        <div class="stat-value">${value}</div>

        <div class="stat-bar-bg">
            <div class="stat-bar-fill"
                 style="width:${percent}%; background:${color};"></div>
        </div>

    </div>
`;
}

/* -------------------------
   FORMATTERS
--------------------------*/

function formatAbility(raw) {
    if (!raw) return "None";

    return raw
        .replace("ABILITY_", "")
        .toLowerCase()
        .replace(/_/g, " ")
        .replace(/\b\w/g, c => c.toUpperCase());
}

function formatType(raw) {
    if (!raw) return "";

    return raw
        .replace("TYPE_", "")
        .toLowerCase()
        .replace(/\b\w/g, c => c.toUpperCase());
}

/* -------------------------
   SPRITE RESOLVER (IMPORTANT FIX)
--------------------------*/

function getSpritePath(pokemon) {
    const base = "webimages/sprites/";

    const key = pokemon.spriteKey?.toLowerCase();

    // 1. exact match from exporter
    let candidates = [
        `${key}.png`,
        `${key}_male.png`,
        `${key}_female.png`
    ];

    return new Promise((resolve) => {
        let i = 0;

        function tryNext() {
            if (i >= candidates.length) {
                resolve(`${base}missingno.png`);
                return;
            }

            const img = new Image();
            img.src = base + candidates[i];

            img.onload = () => resolve(base + candidates[i]);
            img.onerror = () => {
                i++;
                tryNext();
            };
        }

        tryNext();
    });
}

/* -------------------------
   LOAD DATA
--------------------------*/

fetch('webdata/pokemon.json')
  .then(response => response.json())
  .then(async data => {

    const pokemon = data.find(p => p.id === pokemonId);

    if (!pokemon) {
        document.getElementById('pokemon-details').innerHTML =
            '<h1>Pokémon not found</h1>';
        return;
    }

    const spritePath = await getSpritePath(pokemon);

    const bst =
        pokemon.hp +
        pokemon.attack +
        pokemon.defense +
        pokemon.speed +
        pokemon.spAttack +
        pokemon.spDefense;

    document.getElementById('pokemon-details').innerHTML = `

        <div class="pokemon-header">

            <h1>${pokemon.name}</h1>

            <img src="${spritePath}" width="160">

           <div class="type-icons">
            ${[...new Set(pokemon.type)].map(type => {
                const formatted = formatType(type);

                return `
                    <img
                        src="webimages/types/${formatted}.png"
                        alt="${formatted}"
                        height="44">
                `;
            }).join('')}
            </div>

        </div>

        <div class="ability-box">

            <div class="ability-column">
                <h3>Ability 1</h3>
                <p>${formatAbility(pokemon.ability1)}</p>
            </div>

            <div class="ability-column">
                <h3>Ability 2</h3>
                <p>${formatAbility(pokemon.ability2)}</p>
            </div>

            <div class="ability-column">
                <h3>Hidden Ability</h3>
                <p>${formatAbility(pokemon.hiddenAbility)}</p>
            </div>

        </div>

        <div class="stats-box">

            <h2>Base Stats</h2>

            <div class="stats-container">

                ${renderStat("HP", pokemon.hp)}
                ${renderStat("ATK", pokemon.attack)}
                ${renderStat("DEF", pokemon.defense)}
                ${renderStat("SPA", pokemon.spAttack)}
                ${renderStat("SPD", pokemon.spDefense)}
                ${renderStat("SPE", pokemon.speed)}

                <div class="bst">
                    <strong>BST:</strong> ${bst}
                </div>

            </div>

        </div>

    `;
  });

</script>

</body>
</html>
