<!DOCTYPE html>
<html>
<head>
    <title>Pokémon Details</title>

    <style>

    body {
        font-family: Arial, sans-serif;
        max-width: 1000px;
        margin: auto;
        padding: 20px;
    }

    .pokemon-header {
        border: 1px solid #ccc;
        padding: 20px;
        text-align: center;
        margin-bottom: 20px;
    }

    .type-icons img {
        margin: 0 2px;
    }

    .ability-box {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
        margin-bottom: 20px;
    }

    .ability-column {
        border: 1px solid #ccc;
        text-align: center;
        padding: 10px;
        position: relative;
    }

    /* Tooltip styling */
    .ability-tooltip {
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.9);
        color: #fff;
        padding: 10px;
        border-radius: 6px;
        width: 220px;
        font-size: 12px;
        line-height: 1.3;
        opacity: 0;
        pointer-events: none;
        transition: 0.15s ease-in-out;
        z-index: 10;
    }

    .ability-column:hover .ability-tooltip {
        opacity: 1;
    }

    .stats-box {
        border: 1px solid #ccc;
        padding: 20px;
        margin-bottom: 20px;
    }

    .bottom-boxes {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .extra-box {
        border: 1px solid #ccc;
        padding: 20px;
    }

    .stats-container {
        border: 1px solid #ccc;
        padding: 15px;
    }

    .stat-row {
        display: grid;
        grid-template-columns: 40px 40px 1fr;
        align-items: center;
        margin: 6px 0;
        gap: 8px;
    }

    .stat-label {
        font-weight: bold;
    }

    .stat-bar-bg {
        background: #eee;
        height: 14px;
        width: 100%;
        border-radius: 6px;
    }

    .stat-bar-fill {
        height: 14px;
        border-radius: 6px;
    }

    .stat-value {
        text-align: right;
    }

    .bst-row {
        display: grid;
        grid-template-columns: 40px 40px 1fr;
        align-items: center;
        margin-top: 5px;
        gap: 8px;
        font-weight: bold;
    }

    /* -------------------------
       GENDER
    --------------------------*/

    .gender-bar {
        height: 16px;
        width: 100%;
        display: flex;
        border-radius: 6px;
        overflow: hidden;
        border: 1px solid #ccc;
        margin-top: 10px;
    }

    .gender-male {
        background: #4da3ff;
    }

    .gender-female {
        background: #ff6fb1;
    }

    .gender-none {
        background: #777;
        width: 100%;
    }

    .gender-label {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        margin-top: 6px;
    }

    .male-symbol {
        color: #4da3ff;
        font-weight: 900;
    }

    .female-symbol {
        color: #ff6fb1;
        font-weight: 900;
    }

    .genderless-symbol {
        font-weight: 900;
    }

    </style>

</head>
<body>

<div id="pokemon-details"></div>

<script>

const params = new URLSearchParams(window.location.search);
const pokemonId = params.get('id');

/* -------------------------
   FORMATTERS
--------------------------*/

function formatAbility(raw) {
    if (!raw) return "None";
    return raw
        .replace("ABILITY_", "")
        .toLowerCase()
        .replace(/_/g, " ")
        .replace(/\b\w/g, c => c.toUpperCase());
}

function formatType(raw) {
    if (!raw) return "";
    return raw
        .replace("TYPE_", "")
        .toLowerCase()
        .replace(/\b\w/g, c => c.toUpperCase());
}

function formatDex(text) {
    if (!text) return "No entry available.";
    return text.replace(/\\n/g, " ");
}

/* -------------------------
   STAT FUNCTIONS
--------------------------*/

function getStatColor(value) {
    if (value <= 29) return "#e0534c";
    if (value <= 59) return "#ef8636";
    if (value <= 89) return "#F9DE6E";
    if (value <= 119) return "#AED46D";
    if (value <= 149) return "#62CA6B";
    return "#57BFB7";
}

function renderStat(label, value) {

    const percent = Math.min(value / 255, 1) * 100;
    const color = getStatColor(value);

    return `
        <div class="stat-row">
            <div class="stat-label">${label}</div>
            <div class="stat-value">${value}</div>
            <div class="stat-bar-bg">
                <div class="stat-bar-fill" style="width:${percent}%; background:${color};"></div>
            </div>
        </div>
    `;
}

/* -------------------------
   HELPERS
--------------------------*/

function roundHalf(value) {
    return Math.round(value * 2) / 2;
}

/* -------------------------
   GENDER RATIO
--------------------------*/

function renderGenderRatio(ratio) {

    if (ratio === 255 || ratio == null) {
        return `
            <div class="gender-bar">
                <div class="gender-none"></div>
            </div>
            <div class="gender-label">
                <span class="genderless-symbol">〇 Genderless</span>
            </div>
        `;
    }

    const femaleRaw = ratio / 254;
    const maleRaw = 1 - femaleRaw;

    const femalePct = roundHalf(femaleRaw * 100);
    const malePct = roundHalf(maleRaw * 100);

    const maleSpan = `<span><span class="male-symbol">♂</span> ${malePct}%</span>`;
    const femaleSpan = `<span><span class="female-symbol">♀</span> ${femalePct}%</span>`;

    return `
        <div class="gender-bar">
            <div class="gender-male" style="width:${maleRaw * 100}%;"></div>
            <div class="gender-female" style="width:${femaleRaw * 100}%;"></div>
        </div>
        <div class="gender-label">
            ${maleSpan}
            ${femaleSpan}
        </div>
    `;
}

/* -------------------------
   LOAD DATA
--------------------------*/

Promise.all([
    fetch('webdata/pokemon.json').then(r => r.json()),
    fetch('webdata/abilities.json').then(r => r.json())
]).then(([pokemonData, abilitiesData]) => {

    /* FIXED: correct variable */
    const pokemon = pokemonData.find(p => p.id === pokemonId);

    if (!pokemon) {
        document.getElementById('pokemon-details').innerHTML =
            '<h1>Pokémon not found</h1>';
        return;
    }

    /* -------------------------
       ABILITY LOOKUP MAP
    --------------------------*/

    function normalizeAbility(raw) {
        if (!raw) return "None";
        return raw.replace("ABILITY_", "").toLowerCase().replace(/_/g, " ");
    }

    const abilityMap = {};
    abilitiesData.forEach(a => {
        const key = normalizeAbility(a.name || a.id);
        abilityMap[key] = a.description || "No description available.";
    });

    function getAbilityDesc(raw) {
        if (!raw) return "No description available.";
        const key = normalizeAbility(raw);
        return abilityMap[key] || "No description available.";
    }

    function abilityHTML(raw) {
        const name = formatAbility(raw);
        const desc = getAbilityDesc(raw);

        return `
            <div class="ability-column">
                <h3>${name}</h3>
                <p>${name}</p>
                <div class="ability-tooltip">
                    ${desc}
                </div>
            </div>
        `;
    }

    const key = (pokemon.spriteKey || pokemon.name || "").toLowerCase();

    const spriteCandidates = [
        `webimages/sprites/${key}.png`,
        `webimages/sprites/${key}_male.png`,
        `webimages/sprites/${key}_female.png`
    ];

    const bst =
        pokemon.hp +
        pokemon.attack +
        pokemon.defense +
        pokemon.speed +
        pokemon.spAttack +
        pokemon.spDefense;

    document.getElementById('pokemon-details').innerHTML = `

        <div class="pokemon-header">

            <h1>${pokemon.name}</h1>

            <img id="pokemon-sprite" width="160">

            <div class="type-icons">
            ${[...new Set(pokemon.type)].map(type => {
                const formatted = formatType(type);
                return `
                    <img src="webimages/types/${formatted}.png"
                         alt="${formatted}"
                         height="44">
                `;
            }).join('')}
            </div>

        </div>

        <div class="ability-box">

            ${abilityHTML(pokemon.ability1)}
            ${abilityHTML(pokemon.ability2)}
            ${abilityHTML(pokemon.hiddenAbility)}

        </div>

        <div class="stats-box">

            <h2>Base Stats</h2>

            <div class="stats-container">

                ${renderStat("HP", pokemon.hp)}
                ${renderStat("ATK", pokemon.attack)}
                ${renderStat("DEF", pokemon.defense)}
                ${renderStat("SPA", pokemon.spAttack)}
                ${renderStat("SPD", pokemon.spDefense)}
                ${renderStat("SPE", pokemon.speed)}

                <div class="bst-row">
                    <div class="stat-label">BST</div>
                    <div class="stat-value">${bst}</div>
                    <div></div>
                </div>

            </div>
        </div>

        <div class="bottom-boxes">

            <div class="extra-box">
                <h2>Gender Ratio</h2>
                ${renderGenderRatio(pokemon.genderRatio)}
            </div>

            <div class="extra-box">
                <h2>Pokédex Entry</h2>
                <p>${formatDex(pokemon.dexEntry)}</p>
            </div>

        </div>

    `;

    const img = document.getElementById("pokemon-sprite");

    let i = 0;

    function tryNext() {
        if (i >= spriteCandidates.length) {
            img.src = "webimages/sprites/missingno.png";
            return;
        }

        img.src = spriteCandidates[i];
        img.onerror = () => {
            i++;
            tryNext();
        };
    }

    tryNext();

});

</script>

</body>
</html>
