<!DOCTYPE html>
<html>
<head>
    <title>Items</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
        }

        /* LEFT PANEL */
        .left {
            width: 520px;
            border-right: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .search {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        .search input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
        }

        .header-row {
            display: grid;
            grid-template-columns: 1fr 2fr;
            padding: 8px;
            font-size: 12px;
            font-weight: bold;
            background: #f3f3f3;
            border-bottom: 1px solid #ccc;
        }

        .filters {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        /* LIST */
        .item-list {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            cursor: pointer;
        }

        .item-entry:nth-child(even) { background: #f7f7f7; }
        .item-entry:nth-child(odd) { background: #ffffff; }

        .item-entry:hover {
            background: #eaf3ff;
        }

        .item-entry.active {
            background: #d6e8ff !important;
        }

        .item img {
            width: 40px;
            height: 40px;
            image-rendering: pixelated;
        }

        .item-name {
            font-weight: bold;
            padding-right: 10px;
        }

        .item-desc {
            color: #444;
            font-size: 12px;
            line-height: 1.3;
        }

        .item-entry {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            cursor: pointer;
        }

        .item-entry img {
            width: 40px;
            height: 40px;
            image-rendering: pixelated;
        }

        .item-list {
            flex: 1;
            overflow-y: auto;
        }

        /* RIGHT PANEL */
        .right {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .header {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .item img {
            height: 28px;
        }

        .description {
            margin-bottom: 20px;
            color: #444;
            line-height: 1.4;
        }

    </style>
</head>

<body>

<div class="left">

    <div class="search">
        <input id="search" placeholder="Search items...">
    </div>

    <div class="filters">
        <select id="pocketFilter">
            <option value="">Pocket</option>

            <option value="Items">Items</option>
            <option value="Medicine">Medicine</option>
            <option value="Poké Balls">Poké Balls</option>
            <option value="Berries">Berries</option>
            <option value="Mail">Mail</option>
            <option value="Battle Items">Battle Items</option>
            <option value="Key Items">Key Items</option>
            <option value="TMs">TMs</option>
        </select>
    </div>

    <div class="item-list" id="itemList"></div>

</div>

<div class="right" id="itemDetails">
    <h2>Select an Item</h2>
</div>

<script>

let items = [];
let filteredItems = [];

const itemList = document.getElementById("itemList");
const itemDetails = document.getElementById("itemDetails");

const searchInput = document.getElementById("search");
const pocketFilter = document.getElementById("pocketFilter");

async function loadItems() {

    const response = await fetch("webdata/items.json");
    items = await response.json();

    items.sort((a, b) =>
        a.name.localeCompare(b.name)
    );

    filteredItems = [...items];

    renderList();

    if (filteredItems.length) {

        showItem(filteredItems[0]);

        setTimeout(() => {
            const first =
                document.querySelector(".item-entry");

            if (first)
                first.classList.add("active");
        }, 0);
    }
}

function applyFilters() {

    const search = searchInput.value.toLowerCase();
    const pocket = pocketFilter.value;

    filteredItems = items.filter(item => {

        const matchesSearch =
            item.name.toLowerCase().includes(search) ||
            item.description.toLowerCase().includes(search) ||
            item.effect.toLowerCase().includes(search);
        const matchesPocket =
            !pocket ||
            item.pocket === pocket;

        return matchesSearch && matchesPocket;
    });

    renderList();

    if (filteredItems.length) {
        showItem(filteredItems[0]);
    } else {
        itemDetails.innerHTML =
            "<h2>No items found</h2>";
    }
}

function renderList() {

    itemList.innerHTML = "";

    filteredItems.forEach(item => {

        const row = document.createElement("div");

        row.className = "item-entry";

        row.innerHTML = `
            <img
                src="webimages/items/${item.sprite}"
            >

            <div>
                <div class="item-name">
                    ${item.name}
                </div>

                <div class="item-desc">
                    ${item.description || ""}
                </div>
            </div>
        `;

        row.onclick = () => {

            document
                .querySelectorAll(".item-entry")
                .forEach(e =>
                    e.classList.remove("active")
                );

            row.classList.add("active");

            showItem(item);
        };

        itemList.appendChild(row);
    });
}

function showItem(item) {

    itemDetails.innerHTML = `

        <div style="
            display:flex;
            align-items:center;
            gap:15px;
            margin-bottom:20px;
        ">

            <img
                src="webimages/items/${item.sprite}"
                style="
                    width:64px;
                    height:64px;
                    image-rendering:pixelated;
                "
                onerror="this.src='sprites/items/question_mark.png'"
            >

            <div>

                <div class="header">
                    ${item.name}
                </div>

                <div>
                    <strong>Pocket:</strong>
                    ${item.pocket}
                </div>

                <div>
                    <strong>Price:</strong>
                    ₽${item.price}
                </div>

            </div>

        </div>

        <h3>Description</h3>

        <div class="description">
            ${item.description}
        </div>

        <h3>Effect</h3>

        <div class="description">
            ${item.effect}
        </div>
    `;
}

searchInput.addEventListener(
    "input",
    applyFilters
);

pocketFilter.addEventListener(
    "change",
    applyFilters
);

loadItems();

</script>

</body>
</html>
