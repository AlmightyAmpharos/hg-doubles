<!DOCTYPE html>
<html>
<head>
    <title>Pokédex</title>

    <style>
body {
    font-family: Arial, sans-serif;
    margin: 40px;
}

#pokemon-list div {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
}

#pokemon-list img {
    width: 40px;
    height: 40px;
    object-fit: contain;
}
    </style>

</head>
<body>

<h1>Pokédex</h1>

<input
  id="search"
  type="text"
  placeholder="Search Pokémon">

<div id="pokemon-list"></div>

<script>
fetch('webdata/pokemon.json')
  .then(response => response.json())
  .then(data => {

    const list = document.getElementById('pokemon-list');
    const search = document.getElementById('search');

    const SPRITE_BASE = "webimages/sprites/";

    function getSpriteCandidates(pokemon) {
        const key = (pokemon.spriteKey || pokemon.name).toLowerCase();

        return [
            `${key}.png`,
            `${key}_male.png`,
            `${key}_female.png`
        ];
    }

    function createSpriteImg(pokemon) {
        const img = document.createElement("img");

        const candidates = getSpriteCandidates(pokemon);
        let i = 0;

        function tryNext() {
            if (i >= candidates.length) {
                img.src = SPRITE_BASE + "missingno.png";
                return;
            }

            const test = new Image();
            test.src = SPRITE_BASE + candidates[i];

            test.onload = () => {
                img.src = SPRITE_BASE + candidates[i];
            };

            test.onerror = () => {
                i++;
                tryNext();
            };
        }

        tryNext();

        return img;
    }

    function renderPokemon(filter = '') {
        list.innerHTML = '';

        data
        .filter(pokemon =>
            pokemon.name.toLowerCase().includes(filter.toLowerCase())
        )
        .forEach(pokemon => {

            const div = document.createElement('div');

            const img = createSpriteImg(pokemon);

            const link = document.createElement("a");
            link.href = `pokemon-details.html?id=${pokemon.id}`;
            link.textContent = pokemon.name;

            div.appendChild(img);
            div.appendChild(link);

            list.appendChild(div);
        });
    }

    renderPokemon();

    search.addEventListener('input', () => {
        renderPokemon(search.value);
    });

  });
</script>

</body>
</html>
