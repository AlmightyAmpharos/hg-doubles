<!DOCTYPE html>
<html>
<head>
    <title>Abilities</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
        }

        /* LEFT PANEL */

        .left {
            width: 520px;
            border-right: 1px solid #ccc;
            display: flex;
            flex-direction: column;
        }

        .search {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        .search input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
        }

        .header-row {
            display: grid;
            grid-template-columns: 1fr 2fr;
            padding: 8px;
            font-size: 12px;
            font-weight: bold;
            background: #f3f3f3;
            border-bottom: 1px solid #ccc;
        }

        .ability-list {
            overflow-y: auto;
            flex: 1;
        }

        .ability-item {
            display: grid;
            grid-template-columns: 1fr 2fr;
            padding: 8px;
            cursor: pointer;
            font-size: 13px;
            align-items: start;
        }

        .ability-item:nth-child(even) {
            background: #f7f7f7;
        }

        .ability-item:nth-child(odd) {
            background: #ffffff;
        }

        .ability-item:hover {
            background: #eaf3ff;
        }

        .ability-item.active {
            background: #d6e8ff !important;
        }

        .ability-name {
            font-weight: bold;
            padding-right: 10px;
        }

        .ability-desc {
            color: #444;
            font-size: 12px;
            line-height: 1.3;
        }

        /* RIGHT PANEL */

        .right {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .header {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .description {
            margin-bottom: 20px;
            color: #444;
            line-height: 1.4;
        }

        .pokemon-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .pokemon-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
        }

        .pokemon-row img {
            width: 40px;
            height: 40px;
            image-rendering: pixelated;
        }

        .pokemon-row a {
            text-decoration: none;
            color: #222;
            font-weight: bold;
        }

        .pokemon-row a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="left">

    <div class="search">
        <input id="search" placeholder="Search abilities...">
    </div>

    <div class="header-row">
        <div>Ability</div>
        <div>Description</div>
    </div>

    <div class="ability-list" id="abilityList"></div>

</div>

<div class="right" id="abilityDetails">
    <h2>Select an ability</h2>
</div>

<script>

let abilities = [];
let pokemonData = [];
let selectedAbility = null;

/* -----------------------------
   LOAD DATA
------------------------------*/

Promise.all([
    fetch("webdata/abilities.json").then(r => r.json()),
    fetch("webdata/pokemon.json").then(r => r.json())
])
.then(([abilityData, pokemon]) => {

    abilities = abilityData;
    pokemonData = pokemon;

    renderList();
});

/* -----------------------------
   HELPERS
------------------------------*/

function getPokemonByName(name) {
    return pokemonData.find(p => p.name === name);
}

function getSpriteKey(pokemon) {
    return (pokemon.spriteKey || pokemon.name || "")
        .toLowerCase();
}

/* -----------------------------
   LEFT PANEL
------------------------------*/

function renderList() {

    const search = document
        .getElementById("search")
        .value
        .toLowerCase();

    const filtered = abilities.filter(a =>
        a.name.toLowerCase().includes(search)
    );

    const list = document.getElementById("abilityList");

    list.innerHTML = "";

    filtered.forEach(ability => {

        const div = document.createElement("div");

        div.className = "ability-item";

        if (
            selectedAbility &&
            selectedAbility.id === ability.id
        ) {
            div.classList.add("active");
        }

        div.innerHTML = `
            <div class="ability-name">
                ${ability.name}
            </div>

            <div class="ability-desc">
                ${ability.description || ""}
            </div>
        `;

        div.onclick = () => {
            selectedAbility = ability;
            renderList();
            renderDetails();
        };

        list.appendChild(div);
    });
}

/* -----------------------------
   RIGHT PANEL
------------------------------*/

function renderDetails() {

    if (!selectedAbility) return;

    const pokemonHTML = selectedAbility.pokemon
        .map(name => {

            const p = getPokemonByName(name);

            if (!p) {
                return `
                    <div class="pokemon-row">
                        ${name}
                    </div>
                `;
            }

            const spriteKey = getSpriteKey(p);

            return `
                <div class="pokemon-row">

                    <img
                        src="webimages/sprites/${spriteKey}.png"
                        onerror="this.src='webimages/sprites/missingno.png'"
                    >

                    <a href="pokemon-details.html?id=${p.id}">
                        ${p.name}
                    </a>

                </div>
            `;
        })
        .join("");

    document.getElementById("abilityDetails").innerHTML = `

        <div class="header">
            ${selectedAbility.name}
        </div>

        <div class="description">
            ${selectedAbility.description || ""}
        </div>

        <div class="pokemon-title">
            Pokémon with this Ability
        </div>

        ${pokemonHTML}

    `;
}

/* -----------------------------
   EVENTS
------------------------------*/

document
    .getElementById("search")
    .addEventListener("input", renderList);

</script>

</body>
</html>
