<!DOCTYPE html>
<html>
<head>
    <title>Move Dex</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
        }

        /* LEFT PANEL */
        .left {
            width: 520px;
            border-right: 1px solid #ccc;
            display: flex;
            flex-direction: column;
        }

        .search {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        .search input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
        }

        .filters {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        select {
            padding: 6px;
        }

        /* HEADER */
        .header-row {
            display: grid;
            grid-template-columns: 2fr 0.8fr 0.8fr 0.6fr 0.6fr 0.5fr;
            padding: 8px;
            font-size: 12px;
            font-weight: bold;
            background: #f3f3f3;
            border-bottom: 1px solid #ccc;
            text-align: center;
            user-select: none;
        }

        .header-row div {
            cursor: pointer;
        }

        .header-row div:first-child {
            text-align: left;
        }

        .move-list {
            overflow-y: auto;
            flex: 1;
        }

        .move-item {
            display: grid;
            grid-template-columns: 2fr 0.8fr 0.8fr 0.6fr 0.6fr 0.5fr;
            padding: 8px;
            align-items: center;
            cursor: pointer;
            font-size: 13px;
        }

        .move-item:nth-child(even) { background: #f7f7f7; }
        .move-item:nth-child(odd) { background: #ffffff; }
        .move-item:hover { background: #eaf3ff; }
        .move-item.active { background: #d6e8ff !important; }

        .icon {
            height: 18px;
        }

        .small {
            font-size: 12px;
            text-align: center;
        }

        .name {
            text-align: left;
            padding-left: 4px;
        }

        /* RIGHT PANEL */
        .right {
            flex: 1;
            padding: 20px;
        }

        .header {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .icons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .icons img {
            height: 28px;
        }

        .grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 8px 20px;
            max-width: 500px;
        }

        .label { font-weight: bold; color: #444; }
        .value { color: #111; }

        .flags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .flag {
            font-size: 12px;
            padding: 3px 6px;
            border-radius: 4px;
            background: #eee;
        }

        .desc {
            white-space: pre-wrap;
            margin-top: 10px;
            line-height: 1.4;
        }
    </style>
</head>

<body>

<div class="left">

    <div class="search">
        <input id="search" placeholder="Search moves...">
    </div>

    <div class="filters">
        <select id="typeFilter"><option value="">Type</option></select>
        <select id="catFilter">
            <option value="">Category</option>
            <option value="Physical">Physical</option>
            <option value="Special">Special</option>
            <option value="Status">Status</option>
        </select>
    </div>

    <div class="header-row">
        <div data-sort="name">Name</div>
        <div data-sort="type">Type</div>
        <div data-sort="pss">Cat</div>
        <div data-sort="basepower">Pow</div>
        <div data-sort="accuracy">Acc</div>
        <div data-sort="pp">PP</div>
    </div>

    <div class="move-list" id="moveList"></div>

</div>

<div class="right" id="moveDetails">
    <h2>Select a move</h2>
</div>

<script>

let moves = [];
let selected = null;

let sortState = {
    key: "",
    dir: 1
};

/* LOAD */
fetch("webdata/moves.json")
    .then(r => r.json())
    .then(data => {
        moves = data;
        populateFilters();
        renderList();
    });

/* SAFE MOVE */
function safeMove(m) {
    return {
        name: m.name ?? "Unknown",
        type: m.type ?? "",
        pss: m.pss ?? "Status",
        basepower: m.basepower ?? 0,
        accuracy: m.accuracy ?? 0,
        pp: m.pp ?? 0,
        priority: m.priority ?? 0,
        target: m.target ?? "-",
        flags: m.flags ?? [],
        description: m.description ?? ""
    };
}

/* ICONS */
function typeIcon(type) {
    if (!type) return "";
    return `<img class="icon" src="webimages/types/${type}.png">`;
}

function categoryIcon(cat) {
    if (!cat) return "";
    return `<img class="icon" src="webimages/categories/${cat}.png">`;
}

/* FILTERS */
function populateFilters() {
    const types = new Set();

    moves.forEach(m => {
        if (m.type) types.add(m.type);
    });

    const typeFilter = document.getElementById("typeFilter");

    [...types].sort().forEach(t => {
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = t;
        typeFilter.appendChild(opt);
    });
}

/* SORT */
function applySort(data) {
    if (!sortState.key) return data;

    return [...data].sort((a, b) => {
        const av = a[sortState.key] ?? "";
        const bv = b[sortState.key] ?? "";

        if (typeof av === "string") {
            return av.localeCompare(bv) * sortState.dir;
        }

        return (av - bv) * sortState.dir;
    });
}

/* LIST */
function renderList() {

    const search = document.getElementById("search").value.toLowerCase();
    const type = document.getElementById("typeFilter").value;
    const cat = document.getElementById("catFilter").value;

    let filtered = moves
        .map(safeMove)
        .filter(m =>
            (!search || m.name.toLowerCase().includes(search)) &&
            (!type || m.type === type) &&
            (!cat || m.pss === cat)
        );

    filtered = applySort(filtered);

    const list = document.getElementById("moveList");
    list.innerHTML = "";

    filtered.forEach(m => {

        const div = document.createElement("div");
        div.className = "move-item";

        div.innerHTML = `
            <div class="name">${m.name}</div>
            <div class="small">${typeIcon(m.type)}</div>
            <div class="small">${categoryIcon(m.pss)}</div>
            <div class="small">${m.basepower}</div>
            <div class="small">${m.accuracy}</div>
            <div class="small">${m.pp}</div>
        `;

        div.onclick = () => {
            selected = m;
            renderDetails();
        };

        list.appendChild(div);
    });
}

/* DETAILS */
function renderDetails() {
    const m = safeMove(selected);

    document.getElementById("moveDetails").innerHTML = `
        <div class="header">${m.name}</div>

        <div class="icons">
            ${typeIcon(m.type)}
            ${categoryIcon(m.pss)}
        </div>
        
        <div class="grid">
            <div class="label">Power</div>
            <div class="value">${m.basepower}</div>

            <div class="label">Accuracy</div>
            <div class="value">${m.accuracy}</div>

            <div class="label">PP</div>
            <div class="value">${m.pp}</div>

            <div class="label">Priority</div>
            <div class="value">${m.priority ?? 0}</div>

            <div class="label">Target</div>
            <div class="value">${m.target}</div>
        </div>

        <div class="flags">
            ${(Array.isArray(m.flags) ? m.flags : []).map(flag => {

                const clean = flag.toLowerCase();

                let cssClass = "";

                if (clean.includes("contact")) {
                    cssClass = "contact";
                }
                else if (clean.includes("protect")) {
                    cssClass = "protect";
                }
                else if (clean.includes("mirror")) {
                    cssClass = "mirror";
                }
                else if (clean.includes("sound")) {
                    cssClass = "sound";
                }

                return `
                    <span class="flag ${cssClass}">
                        ${flag}
                    </span>
                `;
            }).join("")}
        </div>

        <div class="desc">${m.description}</div>
    `;
}

/* EVENTS */
document.getElementById("search").addEventListener("input", renderList);
document.getElementById("typeFilter").addEventListener("change", renderList);
document.getElementById("catFilter").addEventListener("change", renderList);

/* CLICK SORT HEADERS */
document.querySelectorAll(".header-row div").forEach(el => {
    el.addEventListener("click", () => {
        const key = el.dataset.sort;

        if (sortState.key === key) {
            sortState.dir *= -1;
        } else {
            sortState.key = key;
            sortState.dir = 1;
        }

        renderList();
    });
});

</script>

</body>
</html>
