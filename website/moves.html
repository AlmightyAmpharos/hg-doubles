<!DOCTYPE html>
<html>
<head>
    <title>Move Dex</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
        }

        /* ---------------- LEFT PANEL ---------------- */

        .left {
            width: 480px;
            border-right: 1px solid #ccc;
            display: flex;
            flex-direction: column;
        }

        .search {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        .search input {
            width: 100%;
            box-sizing: border-box; /* FIX OVERFLOW */
            padding: 8px;
        }

        .filters {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        select {
            padding: 6px;
        }

        /* HEADER ROW (like spreadsheet) */
        .header-row {
            display: grid;
            grid-template-columns: 1.5fr 0.8fr 0.8fr 0.6fr 0.6fr 0.5fr;
            padding: 8px;
            font-size: 12px;
            font-weight: bold;
            background: #f3f3f3;
            border-bottom: 1px solid #ccc;
        }

        .move-list {
            overflow-y: auto;
            flex: 1;
        }

        /* ROW */
        .move-item {
            display: grid;
            grid-template-columns: 1.5fr 0.8fr 0.8fr 0.6fr 0.6fr 0.5fr;
            padding: 8px;
            align-items: center;
            cursor: pointer;
            font-size: 13px;
        }

        /* ZEBRA STRIPING */
        .move-item:nth-child(even) {
            background: #f7f7f7;
        }

        .move-item:nth-child(odd) {
            background: #ffffff;
        }

        .move-item:hover {
            background: #eaf3ff;
        }

        .move-item.active {
            background: #d6e8ff !important;
        }

        .icon {
            height: 18px;
            vertical-align: middle;
        }

        .small {
            font-size: 12px;
            text-align: center;
        }

        .name {
            text-align: left;
        }

        /* ---------------- RIGHT PANEL ---------------- */

        .right {
            flex: 1;
            padding: 20px;
        }

        .header {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .icons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .icons img {
            height: 28px;
        }

        .grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 8px 20px;
            max-width: 500px;
        }

        .label {
            font-weight: bold;
            color: #444;
        }

        .value {
            color: #111;
        }

        .flags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .flag {
            font-size: 12px;
            padding: 3px 6px;
            border-radius: 4px;
            background: #eee;
        }

        .flag.contact { background: #d9f2ff; }
        .flag.protect { background: #ffe0e0; }
        .flag.mirror { background: #f3e5ff; }
        .flag.sound { background: #e6ffe6; }

        .desc {
            white-space: pre-wrap;
            margin-top: 10px;
            line-height: 1.4;
        }

    </style>
</head>

<body>

<div class="left">

    <div class="search">
        <input id="search" placeholder="Search moves...">
    </div>

    <div class="filters">
        <select id="typeFilter"><option value="">Type</option></select>
        <select id="catFilter">
            <option value="">Category</option>
            <option value="Physical">Physical</option>
            <option value="Special">Special</option>
            <option value="Status">Status</option>
        </select>

        <select id="sortFilter">
            <option value="">Sort</option>
            <option value="basepower">Power</option>
            <option value="accuracy">Accuracy</option>
            <option value="pp">PP</option>
            <option value="name">Name</option>
        </select>

        <select id="sortDir">
            <option value="desc">Desc</option>
            <option value="asc">Asc</option>
        </select>
    </div>

    <div class="header-row">
        <div>Name</div>
        <div>Type</div>
        <div>Cat</div>
        <div>Pow</div>
        <div>Acc</div>
        <div>PP</div>
    </div>

    <div class="move-list" id="moveList"></div>

</div>

<div class="right" id="moveDetails">
    <h2>Select a move</h2>
</div>

<script>

let moves = [];
let selected = null;

/* ---------------- LOAD ---------------- */

fetch("webdata/moves.json")
    .then(r => r.json())
    .then(data => {
        moves = data;
        populateFilters();
        renderList();
    });

/* ---------------- ICONS ---------------- */

function typeIcon(type) {
    if (!type) return "";
    return `<img class="icon" src="webimages/types/${type}.png">`;
}

function categoryIcon(cat) {
    if (!cat) return "";
    const formatted = cat.charAt(0).toUpperCase() + cat.slice(1).toLowerCase();
    return `<img class="icon" src="webimages/categories/${formatted}.png">`;
}

/* ---------------- FILTERS ---------------- */

function populateFilters() {

    const types = new Set();

    moves.forEach(m => {
        if (m.type) types.add(m.type);
    });

    const typeFilter = document.getElementById("typeFilter");

    [...types].sort().forEach(t => {
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = t;
        typeFilter.appendChild(opt);
    });
}

/* ---------------- SORT ---------------- */

function getSorted(data) {

    const key = document.getElementById("sortFilter").value;
    const dir = document.getElementById("sortDir").value === "asc" ? 1 : -1;

    if (!key) return data;

    return [...data].sort((a, b) => {
        const av = a[key] ?? 0;
        const bv = b[key] ?? 0;

        if (typeof av === "string") {
            return av.localeCompare(bv) * dir;
        }

        return (av - bv) * dir;
    });
}

/* ---------------- LIST ---------------- */

function renderList() {

    const search = document.getElementById("search").value.toLowerCase();
    const type = document.getElementById("typeFilter").value;
    const cat = document.getElementById("catFilter").value;

    let filtered = moves.filter(m =>
        (!search || m.name.toLowerCase().includes(search)) &&
        (!type || m.type === type) &&
        (!cat || m.pss === cat)
    );

    filtered = getSorted(filtered);

    const list = document.getElementById("moveList");
    list.innerHTML = "";

    filtered.forEach(m => {

        const div = document.createElement("div");
        div.className = "move-item";

        div.innerHTML = `
            <div class="name">${m.name}</div>
            <div class="small">${typeIcon(m.type)}</div>
            <div class="small">${categoryIcon(m.pss)}</div>
            <div class="small">${m.basepower ?? "-"}</div>
            <div class="small">${m.accuracy ?? "-"}</div>
            <div class="small">${m.pp ?? "-"}</div>
        `;

        div.onclick = () => {
            selected = m;
            renderDetails();
        };

        list.appendChild(div);
    });
}

/* ---------------- DETAILS ---------------- */

function renderFlags(flags) {
    if (!flags) return "";

    return flags.split("|").map(f => {
        const clean = f.replace("FLAG_", "").toLowerCase();
        return `<span class="flag">${clean}</span>`;
    }).join("");
}

function renderDetails() {

    if (!selected) return;

    document.getElementById("moveDetails").innerHTML = `

        <div class="header">${selected.name}</div>

        <div class="icons">
            ${typeIcon(selected.type)}
            ${categoryIcon(selected.pss)}
        </div>

        <div class="grid">
            <div class="label">Power</div><div class="value">${selected.basepower ?? "-"}</div>
            <div class="label">Accuracy</div><div class="value">${selected.accuracy ?? "-"}</div>
            <div class="label">PP</div><div class="value">${selected.pp ?? "-"}</div>
            <div class="label">Target</div><div class="value">${selected.target ?? "-"}</div>
        </div>

        <div class="flags">
            ${renderFlags(selected.flags)}
        </div>

        <div class="desc">${selected.description || ""}</div>

    `;
}

/* ---------------- EVENTS ---------------- */

document.getElementById("search").addEventListener("input", renderList);
document.getElementById("typeFilter").addEventListener("change", renderList);
document.getElementById("catFilter").addEventListener("change", renderList);
document.getElementById("sortFilter").addEventListener("change", renderList);
document.getElementById("sortDir").addEventListener("change", renderList);

</script>

</body>
</html>
