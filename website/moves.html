<!DOCTYPE html>
<html>
<head>
    <title>Move Dex</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* LEFT PANEL */
        .left {
            width: 320px;
            border-right: 1px solid #ccc;
            display: flex;
            flex-direction: column;
        }

        .search {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        .search input {
            width: 100%;
            padding: 8px;
            font-size: 14px;
        }

        .move-list {
            overflow-y: auto;
            flex: 1;
        }

        .move-item {
            padding: 8px 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .move-item:hover {
            background: #f5f5f5;
        }

        .move-item.active {
            background: #e6f0ff;
        }

        /* RIGHT PANEL */
        .right {
            flex: 1;
            padding: 20px;
        }

        .header {
            font-size: 26px;
            margin-bottom: 10px;
        }

        .icons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }

        .icons img {
            height: 28px;
        }

        .grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 8px 20px;
            max-width: 500px;
        }

        .label {
            font-weight: bold;
            color: #444;
        }

        .value {
            color: #111;
        }

        .section {
            margin-bottom: 20px;
        }

        .desc {
            white-space: pre-wrap;
            line-height: 1.4;
            max-width: 700px;
        }

    </style>
</head>

<body>

<div class="left">
    <div class="search">
        <input id="search" placeholder="Search moves...">
    </div>
    <div id="moveList" class="move-list"></div>
</div>

<div class="right" id="moveDetails">
    <h2>Select a move</h2>
</div>

<script>

let moves = [];
let selected = null;

fetch("webdata/moves.json")
    .then(res => res.json())
    .then(data => {
        moves = data;
        renderList();
    });

/* -------------------------
   ICON HELPERS
--------------------------*/

function typeIcon(type) {
    return `<img src="webimages/types/${type}.png" alt="${type}">`;
}

function categoryIcon(cat) {
    if (!cat) return "";

    const file = cat.toLowerCase(); // Physical.png, Special.png, Status.png
    return `<img src="webimages/categories/${file}.png">`;
}

/* -------------------------
   LEFT LIST
--------------------------*/

function renderList() {

    const filter = document.getElementById("search").value.toLowerCase();
    const list = document.getElementById("moveList");

    list.innerHTML = "";

    moves
        .filter(m => m.name.toLowerCase().includes(filter))
        .forEach(m => {

            const div = document.createElement("div");

            div.className = "move-item";
            div.textContent = m.name;

            div.onclick = () => {
                selected = m;
                renderDetails();
                document.querySelectorAll(".move-item")
                    .forEach(el => el.classList.remove("active"));
                div.classList.add("active");
            };

            list.appendChild(div);
        });
}

document.getElementById("search")
    .addEventListener("input", renderList);

/* -------------------------
   RIGHT DETAILS PANEL
--------------------------*/

function renderDetails() {

    if (!selected) return;

    document.getElementById("moveDetails").innerHTML = `

        <div class="section">
            <div class="header">${selected.name}</div>

            <div class="icons">
                ${typeIcon(selected.type)}
                ${categoryIcon(selected.pss)}
            </div>
        </div>

        <div class="section">
            <div class="grid">
                <div class="label">Power</div>
                <div class="value">${selected.basepower ?? "-"}</div>

                <div class="label">Accuracy</div>
                <div class="value">${selected.accuracy ?? "-"}</div>

                <div class="label">PP</div>
                <div class="value">${selected.pp ?? "-"}</div>

                <div class="label">Target</div>
                <div class="value">${selected.target ?? "-"}</div>

                <div class="label">Effect</div>
                <div class="value">${selected.battleeffect ?? "-"}</div>
            </div>
        </div>

        <div class="section">
            <div class="label">Description</div>
            <div class="desc">${selected.description || ""}</div>
        </div>

    `;
}

</script>

</body>
</html>
